# Testes E2E + relatório Allure com histórico de tendências
name: E2E e Allure

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  ALLURE_VERSION: "2.30.0"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clonar branch gh-pages (histórico Allure)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci-clone-gh-pages.sh

      - name: Java (Allure CLI precisa de JRE)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Playwright (Chromium + deps do sistema)
        run: python -m playwright install --with-deps chromium

      - name: Allure CLI
        run: |
          set -eux
          curl -fsSL "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz" \
            | tar -xz -C "${RUNNER_TEMP}"
          ALLURE_BIN="${RUNNER_TEMP}/allure-${ALLURE_VERSION}/bin"
          echo "${ALLURE_BIN}" >> "${GITHUB_PATH}"
          echo "PATH=${ALLURE_BIN}:${PATH}" >> "${GITHUB_ENV}"
          "${ALLURE_BIN}/allure" --version

      - name: Rodar testes
        run: python -m pytest -v -o addopts="--alluredir=allure-results"

      - name: Restaurar histórico Allure
        if: always()
        run: bash scripts/restore-allure-history.sh

      - name: Gerar relatório (mesmo script que no local)
        if: always()
        run: bash allure-custom/report.sh

      - name: Painel de histórico (10 dias) + site para Pages
        if: always()
        env:
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/build_dashboard.py \
            --allure-results allure-results \
            --previous-history gh-pages-prev/dashboard-history.json \
            --out-dir publish-site \
            --keep-days 10 \
            --allure-href allure/index.html
          if [ -d allure-report ]; then
            rm -rf publish-site/allure
            mv allure-report publish-site/allure
          fi

      - name: Upload do site (painel + Allure) para download
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: publish-site/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload dos resultados brutos (debug)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 7

  # Publica o allure-report em uma URL (só push em main/master — PR continua só com ZIP).
  publish-pages:
    name: Publicar relatório no GitHub Pages
    concurrency:
      group: github-pages-allure
      cancel-in-progress: false
    needs: e2e
    if: |
      always() &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Baixar allure-report gerado no job anterior
        id: dl
        uses: actions/download-artifact@v8
        with:
          name: allure-report
          path: _site

      - name: Checar se há index.html
        id: ok
        run: |
          if [ -f _site/index.html ]; then
            echo "deploy=1" >> "$GITHUB_OUTPUT"
          else
            echo "deploy=0" >> "$GITHUB_OUTPUT"
            echo "::notice::Sem allure-report para publicar (baixe o artefato na aba Summary se existir)."
          fi

      - name: Configurar GitHub Pages
        if: steps.ok.outputs.deploy == '1'
        uses: actions/configure-pages@v5

      - name: Preparar artefato para Pages
        if: steps.ok.outputs.deploy == '1'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Publicar site
        if: steps.ok.outputs.deploy == '1'
        id: deploy
        uses: actions/deploy-pages@v5
