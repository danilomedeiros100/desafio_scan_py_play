# Testes E2E + relatório Allure com o mesmo fluxo local (pytest → allure-custom/report.sh)
name: E2E e Allure

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  ALLURE_VERSION: "2.30.0"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Java (Allure CLI precisa de JRE)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Dependências
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Playwright (Chromium + deps do sistema)
        run: python -m playwright install --with-deps chromium

      - name: Allure CLI
        run: |
          set -eux
          curl -fsSL "https://github.com/allure-framework/allure2/releases/download/${ALLURE_VERSION}/allure-${ALLURE_VERSION}.tgz" \
            | tar -xz -C "${RUNNER_TEMP}"
          ALLURE_BIN="${RUNNER_TEMP}/allure-${ALLURE_VERSION}/bin"
          echo "${ALLURE_BIN}" >> "${GITHUB_PATH}"
          # GITHUB_PATH só vale no *próximo* step; aqui precisamos exportar no mesmo job
          echo "PATH=${ALLURE_BIN}:${PATH}" >> "${GITHUB_ENV}"
          "${ALLURE_BIN}/allure" --version

      # Sem --headed: o pytest-playwright só aceita a flag --headed (não existe --headed=false).
      # O pytest.ini força --headed para uso local; aqui sobrescrevemos addopts para CI (headless).
      - name: Rodar testes
        run: python -m pytest -v -o addopts="--alluredir=allure-results"

      - name: Gerar relatório (mesmo script que no local)
        if: always()
        run: bash allure-custom/report.sh

      - name: Upload do relatório HTML
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload dos resultados brutos (debug)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: ignore
          retention-days: 7
